<!DOCTYPE html>
<html lang="am" class="w-full h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOTC Event Masterclass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #001229;
            --royal-gold: #D4AF37;
            --glow-gold: #FFDF00;
        }
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif; margin: 0; padding: 0;
            width: 100vw; height: 100vh; overflow: hidden; background-color: var(--deep-blue);
            display: flex; justify-content: center; align-items: center;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            /* FOCAL_POINT_PLACEHOLDER */
        }

        .overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 18, 41, 0.3) 0%, rgba(0, 18, 41, 0.85) 100%); 
            z-index: 20;
        }

        .event-grid {
            position: relative; z-index: 30; width: 88%; height: 88%;
            display: grid; grid-template-rows: auto 1fr;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
            border-top: 2px solid rgba(255,255,255,0.6);
            border-left: 2px solid rgba(255,255,255,0.3);
            border-right: 2px solid rgba(212, 175, 55, 0.2);
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 40px; box-shadow: 0 60px 140px rgba(0,0,0,0.9), inset 0 0 80px rgba(212, 175, 55, 0.05);
            overflow: hidden;
        }

        .event-header {
            background: linear-gradient(90deg, var(--royal-gold), var(--glow-gold), var(--royal-gold));
            padding: 2.5% 5%; font-size: 3vh; color: var(--deep-blue); font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.5vw; text-align: center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .event-body {
            padding: 6% 8%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .title-box {
            font-size: 9vh; font-weight: 900; color: white; margin-bottom: 2vh; text-wrap: balance; line-height: 1.1;
            text-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .subtitle-box {
            font-size: 4vh; color: var(--glow-gold); font-weight: 700; margin-bottom: 6vh; text-wrap: balance;
            background: rgba(0,0,0,0.4); padding: 1vh 3vh; border-radius: 50px;
        }

        .details-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4%; width: 100%; margin-top: 2vh;
        }

        .pod {
            background: rgba(0, 0, 0, 0.4); 
            border-top: 3px solid var(--royal-gold); border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 5vh; border-radius: 30px; box-shadow: inset 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; justify-content: center;
        }

        .pod-label {
            font-size: 2.5vh; color: var(--royal-gold); text-transform: uppercase; letter-spacing: 0.2vw; margin-bottom: 2vh;
            /* World Class Blend Mode: makes gold interact deeply */
            mix-blend-mode: color-dodge;
        }

        .pod-value {
            font-size: 4.2vh; color: white; font-weight: 700; line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- BACKGROUND_LAYER -->
    <div class="overlay"></div>
    
    <!-- SUBJECT_LAYER -->

    <!-- WATERMARK_LAYER -->

    <div class="event-grid">
        <div class="event-header">ልዩ መርሐግብር / EVENT</div>
        <div class="event-body">
            <h1 class="title-box"><!-- TITLE --></h1>
            <div class="subtitle-box"><!-- SUB_TITLE --></div>
            <div class="details-grid">
                <div class="pod">
                    <div class="pod-label">አድራሻ / Location</div>
                    <div class="pod-value"><!-- DETAILS --></div>
                </div>
                <div class="pod">
                    <div class="pod-label">ሰዓት / Time & Info</div>
                    <div class="pod-value"><!-- CALL_TO_ACTION --></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
