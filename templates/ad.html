<!DOCTYPE html>
<html lang="am" class="w-full h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOTC Premium Ad Masterclass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #001229;
            --pure-gold: #FFD700;
            --shadow-gold: #B8860B;
        }
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif; margin: 0; padding: 0;
            width: 100vw; height: 100vh; overflow: hidden; background-color: var(--deep-blue);
            display: flex; justify-content: center; align-items: center;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            filter: contrast(1.1) brightness(1.05) saturate(1.05);
            image-rendering: -webkit-optimize-contrast;
            /* FOCAL_POINT_PLACEHOLDER */
        }

        /* Abstract volumetric particles rendering via pure CSS */
        .particles {
            position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 215, 0, 0.05) 1vw, transparent 1.5vw),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.03) 0.5vw, transparent 1vw),
                radial-gradient(circle at 50% 80%, rgba(200, 150, 50, 0.08) 2vw, transparent 3vw);
            z-index: 12;
        }

        .dramatic-gradient {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(171deg, rgba(0, 18, 41, 0.05) 0%, rgba(0, 18, 41, 0.5) 40%, rgba(0, 10, 25, 0.95) 100%);
            z-index: 20;
        }

        .vector-swoosh {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(90deg, rgba(255,215,0,0.05), transparent);
            clip-path: polygon(0 40%, 100% 0, 100% 100%, 0% 100%);
            z-index: 25; pointer-events: none;
        }

        .content-container {
            position: absolute; bottom: 7%; left: 6%; width: 88%; z-index: 30;
            display: flex; flex-direction: column; align-items: flex-start;
        }

        .subtitle-box {
            font-size: 3.5vh; color: var(--pure-gold); text-transform: uppercase;
            font-weight: 700; letter-spacing: 0.5vw; margin-bottom: 2vh;
            background: rgba(0, 0, 0, 0.6); padding: 1vh 3vh; 
            border-left: 0.8vw solid var(--pure-gold);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .title-box {
            font-size: 11vh; font-weight: 900; color: #FFFFFF; line-height: 1.05;
            margin-bottom: 3vh; text-wrap: balance; max-width: 90%;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 1), 6px 6px 0px rgba(255, 215, 0, 0.3), 0 30px 60px rgba(0,0,0,0.9);
            -webkit-text-stroke: 1px rgba(255,255,255,0.4);
        }

        .details-box {
            font-size: 4.5vh; font-weight: 400; color: #E8E8E8; line-height: 1.6;
            max-width: 85%; margin-bottom: 6vh; 
            text-shadow: 0 10px 30px rgba(0,0,0,1);
            text-wrap: balance;
        }

        .cta-box {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, var(--pure-gold) 0%, var(--shadow-gold) 100%);
            color: var(--deep-blue); padding: 2vh 6vh; border-radius: 80px;
            font-size: 4.5vh; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.3), inset 0 4px 10px rgba(255,255,255,0.6);
            border: 2px solid rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <!-- BACKGROUND_LAYER -->
    <div class="particles"></div>
    <div class="dramatic-gradient"></div>
    <div class="vector-swoosh"></div>
    
    <!-- SUBJECT_LAYER -->

    <!-- WATERMARK_LAYER -->

    <div class="content-container">
        <div class="subtitle-box"><!-- SUB_TITLE --></div>
        <h1 class="title-box"><!-- TITLE --></h1>
        <p class="details-box"><!-- DETAILS --></p>
        <div class="cta-box"><!-- CALL_TO_ACTION --></div>
    </div>
</body>
</html>
